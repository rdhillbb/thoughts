<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slick Johnson's Solar System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── Starfield ── */
  .stars, .stars2, .stars3 {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .stars  { background: radial-gradient(1px 1px at 10% 20%, #fff 100%, transparent), radial-gradient(1px 1px at 40% 60%, #fff 100%, transparent), radial-gradient(1px 1px at 70% 10%, #fff 100%, transparent), radial-gradient(1.5px 1.5px at 90% 80%, #ffd 100%, transparent), radial-gradient(1px 1px at 25% 45%, #fff 100%, transparent), radial-gradient(1px 1px at 55% 75%, #fff 100%, transparent), radial-gradient(1px 1px at 85% 35%, #fff 100%, transparent), radial-gradient(1px 1px at 15% 90%, #fff 100%, transparent); animation: drift 120s linear infinite; }
  .stars2 { background: radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,.6) 100%, transparent), radial-gradient(1px 1px at 30% 15%, rgba(255,255,255,.5) 100%, transparent), radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,.7) 100%, transparent), radial-gradient(1px 1px at 80% 40%, rgba(255,255,255,.4) 100%, transparent), radial-gradient(1px 1px at 50% 30%, rgba(255,255,255,.6) 100%, transparent), radial-gradient(1px 1px at 20% 70%, rgba(255,255,255,.5) 100%, transparent); animation: drift 180s linear infinite reverse; }
  .stars3 { background: radial-gradient(1.5px 1.5px at 45% 25%, rgba(200,220,255,.8) 100%, transparent), radial-gradient(2px 2px at 75% 55%, rgba(255,220,180,.6) 100%, transparent), radial-gradient(1.5px 1.5px at 20% 80%, rgba(180,200,255,.7) 100%, transparent), radial-gradient(1px 1px at 95% 15%, rgba(255,255,200,.5) 100%, transparent); animation: twinkle 4s ease-in-out infinite alternate; }
  @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-20px); } }
  @keyframes twinkle { from { opacity: .7; } to { opacity: 1; } }

  /* ── Header ── */
  .header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 20px 20px 5px;
  }
  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 5vw, 56px);
    background: linear-gradient(135deg, #f9d423, #ff4e50, #f9d423);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 4s ease infinite;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: clamp(13px, 2vw, 18px);
    color: #8899aa;
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .header .aka {
    font-size: clamp(11px, 1.5vw, 14px);
    color: #7ec8e3;
    margin-top: 4px;
    font-style: italic;
  }
  @keyframes gradShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  /* ── Solar System Container ── */
  .solar-system {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 100vw;
    height: calc(100vh - 120px);
    min-height: 500px;
    margin: 0 auto;
  }

  /* ── Sun ── */
  .sun {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff8e1, #ffb300, #ff6f00, #bf360c);
    box-shadow:
      0 0 40px 10px rgba(255,179,0,.5),
      0 0 80px 30px rgba(255,111,0,.3),
      0 0 140px 60px rgba(255,111,0,.15),
      0 0 200px 90px rgba(191,54,12,.08);
    animation: sunPulse 5s ease-in-out infinite alternate;
    z-index: 20;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center;
  }
  .sun .icon { font-size: 32px; filter: drop-shadow(0 0 4px rgba(0,0,0,.4)); }
  .sun .label {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,.6);
    margin-top: 2px;
    letter-spacing: 1px;
  }
  .sun .sublabel {
    font-size: 6.5px;
    color: rgba(255,255,255,.8);
    text-shadow: 0 1px 2px rgba(0,0,0,.5);
    margin-top: 1px;
  }
  @keyframes sunPulse {
    from { box-shadow: 0 0 40px 10px rgba(255,179,0,.5), 0 0 80px 30px rgba(255,111,0,.3), 0 0 140px 60px rgba(255,111,0,.15); }
    to   { box-shadow: 0 0 50px 15px rgba(255,179,0,.6), 0 0 100px 40px rgba(255,111,0,.35), 0 0 170px 80px rgba(255,111,0,.2); }
  }

  /* ── Orbit Rings ── */
  .orbit {
    position: absolute;
    top: 50%; left: 50%;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
  }
  .orbit:hover { border-color: rgba(255,255,255,.12); }

  /* ── Planet Wrapper (handles the circular orbit animation) ── */
  .planet-orbit {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    z-index: 10;
  }

  /* ── Planet ── */
  .planet {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center;
    transition: transform .3s ease, box-shadow .3s ease;
    z-index: 15;
  }
  .planet:hover {
    transform: scale(1.25) !important;
    z-index: 50;
  }
  .planet .icon { filter: drop-shadow(0 0 3px rgba(0,0,0,.5)); }
  .planet .name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,.8);
    letter-spacing: .5px;
    white-space: nowrap;
  }

  /* ── Tooltip ── */
  .tooltip {
    position: absolute;
    background: rgba(10, 15, 30, .95);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 240px;
    max-width: 300px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .25s ease, transform .25s ease;
    z-index: 100;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .tooltip.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .tooltip h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .tooltip p {
    font-size: 12.5px;
    line-height: 1.6;
    color: #b0bec5;
  }
  .tooltip .services {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 8px;
  }
  .tooltip .services span {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.1);
    color: #cfd8dc;
    white-space: nowrap;
  }

  /* ── Moon ── */
  .moon-orbit {
    position: absolute;
    border: 1px dashed rgba(255,255,255,.08);
    border-radius: 50%;
    z-index: 8;
  }
  .moon {
    position: absolute;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    cursor: pointer;
    z-index: 12;
    transition: transform .3s ease;
  }
  .moon:hover { transform: scale(1.5) !important; z-index: 50; }
  .moon.aws-moon {
    animation: awsMoonPulse 4s ease-in-out infinite;
  }
  .moon.aws-moon:hover { animation: none; transform: scale(2) !important; z-index: 50; }
  @keyframes awsMoonPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(2); }
  }
  .moon .name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 500;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
    white-space: nowrap;
  }

  /* ── Legend ── */
  .legend {
    position: relative; z-index: 10;
    max-width: 800px;
    margin: 0 auto 40px;
    padding: 0 20px;
  }
  .legend h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    color: #8899aa;
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .legend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .legend-item {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    transition: background .2s ease, border-color .2s ease;
  }
  .legend-item:hover {
    background: rgba(255,255,255,.06);
    border-color: rgba(255,255,255,.12);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .legend-item h4 {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: .5px;
    margin-bottom: 3px;
  }
  .legend-item p {
    font-size: 12px;
    color: #78909c;
    line-height: 1.5;
  }

  /* ── Footer ── */
  .footer-note {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: #445566;
    font-style: italic;
    position: relative;
    z-index: 10;
  }

  /* ── Speed control ── */
  .controls {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 100;
    display: flex; gap: 8px;
  }
  .controls button {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.15);
    background: rgba(10,15,30,.85);
    color: #8899aa;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all .2s ease;
    letter-spacing: 1px;
  }
  .controls button:hover, .controls button.active {
    background: rgba(255,179,0,.15);
    border-color: rgba(255,179,0,.4);
    color: #ffb300;
  }
</style>
</head>
<body>

<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<div class="header">
  <h1>Slick Johnson's Solar System</h1>
  <div class="subtitle">Sukabumi Fax Service Operations Universe</div>
  <div class="aka">AKA Claude Code, by Anthropic &mdash; Reporting from Gum Springs Mission Control</div>
</div>

<div class="solar-system" id="solarSystem"></div>

<div class="legend">
  <h2>System Map</h2>
  <div class="legend-grid" id="legendGrid"></div>
</div>

<div class="footer-note">
  &copy; 2026 Slick Johnson &bull; GovBotic Operations &bull; Built from a MacBook in Gum Springs
</div>

<div class="controls">
  <button onclick="setSpeed(0)" title="Pause">&#9208; PAUSE</button>
  <button onclick="setSpeed(1)" class="active" title="Normal speed">1&times;</button>
  <button onclick="setSpeed(3)" title="Fast">3&times;</button>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── Data ──
const planets = [
  {  // idx 0
    name: 'Stripe',
    icon: '&#128179;',
    color: '#635bff',
    size: 44,
    orbitRadius: 220,
    period: 30,
    startAngle: 51,
    desc: 'Payment processing — every $2.75 transaction',
    services: ['Checkout', 'Webhooks', 'Refunds', 'Analytics']
  },
  {  // idx 1
    name: 'Telnyx',
    icon: '&#128222;',
    color: '#00c853',
    size: 46,
    orbitRadius: 310,
    period: 38,
    startAngle: 102,
    desc: 'Telecom backbone — 6 fax lines, copper-to-digital',
    services: ['Fax Lines', 'SIP Trunks', 'Number Porting', 'T.38']
  },
  {  // idx 2
    name: 'Google',
    icon: '&#128270;',
    color: '#4285f4',
    size: 50,
    orbitRadius: 390,
    period: 46,
    startAngle: 200,
    desc: 'Search Console, indexing, organic traffic driver',
    services: ['Search Console', 'Indexing API', 'SEO', 'Analytics']
  },
  {  // idx 3
    name: 'Bing',
    icon: '&#129302;',
    color: '#00897b',
    size: 42,
    orbitRadius: 470,
    period: 54,
    startAngle: 260,
    desc: 'Webmaster Tools & Copilot AI citations (83/day peak)',
    services: ['Webmaster Tools', 'Copilot Citations', 'IndexNow']
  },
  {  // idx 4
    name: 'macOS',
    icon: '&#128421;',
    color: '#a0a0a0',
    size: 40,
    orbitRadius: 550,
    period: 62,
    startAngle: 320,
    desc: 'Build systems, scheduled jobs, monitoring scripts',
    services: ['Cron Jobs', 'Build Scripts', 'Monitoring', 'Deploys']
  },
  {  // idx 5
    name: 'Next.js + Go',
    icon: '&#9889;',
    color: '#e040fb',
    size: 48,
    orbitRadius: 630,
    period: 70,
    startAngle: 155,
    desc: 'Frontend (Next.js) and Backend (Go) codebase',
    services: ['Next.js SSR', 'Go API', 'Nginx', 'TLS']
  },
  {  // idx 6
    name: 'ChatGPT',
    icon: '&#129504;',
    color: '#10a37f',
    size: 44,
    orbitRadius: 710,
    period: 78,
    startAngle: 30,
    desc: 'OpenAI AI engine — 101 referred visitors in 10 days',
    services: ['GPTBot Crawler', 'AI Referrals', 'Recommendations']
  },
  {  // idx 7
    name: 'OpenRouter',
    icon: '&#128300;',
    color: '#f06292',
    size: 42,
    orbitRadius: 790,
    period: 82,
    startAngle: 110,
    desc: 'Multi-model API router for AI access',
    services: ['Model Routing', 'API Gateway', 'Multi-Provider']
  },
  {  // idx 8
    name: 'Claude Code',
    icon: '&#129302;',
    color: '#d4a574',
    size: 46,
    orbitRadius: 870,
    period: 88,
    startAngle: 220,
    desc: 'Anthropic CLI agent — AKA Slick Johnson himself',
    services: ['Agentic Coding', 'Deploys', 'Monitoring', 'Analysis']
  },
  {  // idx 9
    name: 'Coworks',
    icon: '&#128736;',
    color: '#7ec8e3',
    size: 42,
    orbitRadius: 950,
    period: 94,
    startAngle: 300,
    desc: 'Claude Coworks — desktop AI collaboration tool',
    services: ['Desktop Agent', 'File Management', 'Task Automation']
  },
  {  // idx 10 — outermost, with room for 8 moons
    name: 'AWS',
    icon: '&#9729;&#65039;',
    color: '#ff9900',
    size: 62,
    orbitRadius: 1080,
    period: 105,
    startAngle: 0,
    desc: 'Cloud infrastructure backbone — a solar system of its own',
    services: ['EC2', 'S3', 'Cognito', 'Billing', 'CloudWatch', 'EBS', 'Security Groups', 'NGINX']
  }
];

const moons = [
  // AWS moons (parentIdx: 10 — outermost planet, wide orbits for visibility)
  { name: 'EC2',       icon: '&#9881;',   color: '#ff9900', size: 22, parentIdx: 10, moonRadius: 80,  period: 6,   startAngle: 0,   desc: 'Elastic Compute Cloud — production servers' },
  { name: 'S3',        icon: '&#128230;', color: '#e25444', size: 21, parentIdx: 10, moonRadius: 100, period: 7.5, startAngle: 45,  desc: 'Simple Storage Service — file & asset storage' },
  { name: 'Cognito',   icon: '&#128272;', color: '#dd344c', size: 20, parentIdx: 10, moonRadius: 120, period: 9,   startAngle: 90,  desc: 'User authentication & identity management' },
  { name: 'Billing',   icon: '&#128176;', color: '#2eb872', size: 19, parentIdx: 10, moonRadius: 140, period: 10.5,startAngle: 135, desc: 'AWS cost tracking & budget alerts' },
  { name: 'CloudWatch',icon: '&#128065;', color: '#b0084d', size: 20, parentIdx: 10, moonRadius: 160, period: 7,   startAngle: 180, desc: 'Monitoring, logs, and alerting' },
  { name: 'EBS',       icon: '&#128190;', color: '#3b48cc', size: 19, parentIdx: 10, moonRadius: 180, period: 9.5, startAngle: 225, desc: 'Elastic Block Store — persistent disk volumes' },
  { name: 'Sec Groups',icon: '&#128737;', color: '#cc6600', size: 20, parentIdx: 10, moonRadius: 200, period: 8,   startAngle: 270, desc: 'Security Groups — firewall rules for EC2' },
  { name: 'NGINX',     icon: '&#9881;',   color: '#009639', size: 21, parentIdx: 10, moonRadius: 220, period: 7.8, startAngle: 315, desc: 'Reverse proxy, load balancer, and security layer' },
  // Other moons
  { name: 'Perplexity',    icon: '&#128161;', color: '#5c6bc0', size: 22, parentIdx: 1, moonRadius: 38, period: 7,   startAngle: 120, desc: 'Actively crawling & citing Sukabumi Fax Service' }
];

// ── Build ──
const container = document.getElementById('solarSystem');
const tooltipEl = document.getElementById('tooltip');
const legendGrid = document.getElementById('legendGrid');
let speedMultiplier = 1;
let animFrame;
let planetEls = [];
let moonEls = [];

// Draw orbit rings
planets.forEach(p => {
  const ring = document.createElement('div');
  ring.className = 'orbit';
  const d = p.orbitRadius * 2;
  ring.style.width = d + 'px';
  ring.style.height = d + 'px';
  container.appendChild(ring);
});

// Sun
const sun = document.createElement('div');
sun.className = 'sun';
sun.innerHTML = `<span class="icon">&#128187;</span><span class="label">MACBOOK</span><span class="sublabel">Gum Springs HQ</span>`;
sun.addEventListener('mouseenter', e => showTooltip(e, { name: 'Mission Control', color: '#ffb300', desc: 'A MacBook in Gum Springs — Slick Johnson\'s command center. Monday-Saturday: 8 min/day monitoring. Sunday: 3-5 hour collaboration session.', services: ['Automation', 'Monitoring', 'Deploys', 'Analysis'] }));
sun.addEventListener('mouseleave', hideTooltip);
container.appendChild(sun);

// Planets
planets.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'planet';
  el.style.width = p.size + 'px';
  el.style.height = p.size + 'px';
  el.style.background = `radial-gradient(circle at 35% 35%, ${lighten(p.color, 40)}, ${p.color}, ${darken(p.color, 30)})`;
  el.style.boxShadow = `0 0 ${p.size/3}px ${p.size/8}px ${p.color}44, inset -${p.size/6}px -${p.size/6}px ${p.size/4}px rgba(0,0,0,.3)`;
  el.innerHTML = `<span class="icon" style="font-size:${p.size * 0.38}px">${p.icon}</span><span class="name" style="font-size:${Math.max(7, p.size * 0.16)}px;margin-top:1px;color:${lighten(p.color, 50)}">${p.name}</span>`;
  el.addEventListener('mouseenter', e => showTooltip(e, p));
  el.addEventListener('mouseleave', hideTooltip);
  container.appendChild(el);
  planetEls.push({ el, data: p, angle: p.startAngle * Math.PI / 180 });
});

// Moons
let awsMoonIdx = 0;
moons.forEach((m, i) => {
  const el = document.createElement('div');
  const isAwsMoon = m.parentIdx === 10;
  el.className = isAwsMoon ? 'moon aws-moon' : 'moon';
  if (isAwsMoon) {
    el.style.animationDelay = (awsMoonIdx * 0.5) + 's';
    awsMoonIdx++;
  }
  el.style.width = m.size + 'px';
  el.style.height = m.size + 'px';
  el.style.background = `radial-gradient(circle at 35% 35%, ${lighten(m.color, 30)}, ${m.color})`;
  el.style.boxShadow = `0 0 ${m.size/3}px ${m.size/8}px ${m.color}33`;
  el.innerHTML = `<span class="icon" style="font-size:${m.size * 0.4}px">${m.icon}</span><span class="name" style="font-size:${Math.max(6, m.size * 0.24)}px;color:${lighten(m.color, 40)}">${m.name}</span>`;
  el.addEventListener('mouseenter', e => showTooltip(e, m));
  el.addEventListener('mouseleave', hideTooltip);
  container.appendChild(el);
  moonEls.push({ el, data: m, angle: m.startAngle * Math.PI / 180 });
});

// Legend
planets.forEach(p => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${p.color};box-shadow:0 0 6px ${p.color}88"></div><div><h4 style="color:${lighten(p.color, 30)}">${p.name}</h4><p>${p.desc}</p></div>`;
  legendGrid.appendChild(item);
});
// Add moons to legend
moons.forEach(m => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${m.color};box-shadow:0 0 6px ${m.color}88;width:7px;height:7px"></div><div><h4 style="color:${lighten(m.color, 30)}">${m.name} <span style="font-size:9px;color:#556677;font-weight:400">(moon)</span></h4><p>${m.desc}</p></div>`;
  legendGrid.appendChild(item);
});

// ── Animation Loop ──
let lastTime = performance.now();

function animate(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  const cx = container.offsetWidth / 2;
  const cy = container.offsetHeight / 2;
  const scale = Math.min(container.offsetWidth, container.offsetHeight) / 2700;
  const sunRadius = 55;  // half of 110px sun
  const minOrbitPx = sunRadius + 20;  // no planet closer than 20px from sun edge

  planetEls.forEach(pe => {
    const speed = (2 * Math.PI) / pe.data.period;
    pe.angle += speed * dt * speedMultiplier;

    const r = Math.max(pe.data.orbitRadius * scale, minOrbitPx + pe.data.size / 2);
    const x = cx + Math.cos(pe.angle) * r - pe.data.size / 2;
    const y = cy + Math.sin(pe.angle) * r - pe.data.size / 2;
    pe.el.style.left = x + 'px';
    pe.el.style.top = y + 'px';
    pe.currentX = cx + Math.cos(pe.angle) * r;
    pe.currentY = cy + Math.sin(pe.angle) * r;
  });

  moonEls.forEach(me => {
    const parent = planetEls[me.data.parentIdx];
    const speed = (2 * Math.PI) / me.data.period;
    me.angle += speed * dt * speedMultiplier;

    const mr = me.data.moonRadius * scale;
    const x = parent.currentX + Math.cos(me.angle) * mr - me.data.size / 2;
    const y = parent.currentY + Math.sin(me.angle) * mr - me.data.size / 2;
    me.el.style.left = x + 'px';
    me.el.style.top = y + 'px';
  });

  animFrame = requestAnimationFrame(animate);
}
animFrame = requestAnimationFrame(animate);

// ── Tooltip ──
function showTooltip(e, data) {
  let html = `<h3 style="color:${data.color || '#ffb300'}">${data.name}</h3><p>${data.desc}</p>`;
  if (data.services) {
    html += '<div class="services">' + data.services.map(s => `<span>${s}</span>`).join('') + '</div>';
  }
  tooltipEl.innerHTML = html;
  tooltipEl.classList.add('visible');
  positionTooltip(e);
}
function hideTooltip() { tooltipEl.classList.remove('visible'); }
function positionTooltip(e) {
  const rect = tooltipEl.getBoundingClientRect();
  let x = e.clientX + 16;
  let y = e.clientY - 10;
  if (x + rect.width > window.innerWidth - 10) x = e.clientX - rect.width - 16;
  if (y + rect.height > window.innerHeight - 10) y = window.innerHeight - rect.height - 10;
  if (y < 10) y = 10;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
  tooltipEl.style.position = 'fixed';
}
document.addEventListener('mousemove', e => {
  if (tooltipEl.classList.contains('visible')) positionTooltip(e);
});

// ── Speed Controls ──
function setSpeed(s) {
  speedMultiplier = s;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ── Color Helpers ──
function lighten(hex, pct) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (num >> 16) + Math.round(255 * pct / 100));
  const g = Math.min(255, ((num >> 8) & 0xff) + Math.round(255 * pct / 100));
  const b = Math.min(255, (num & 0xff) + Math.round(255 * pct / 100));
  return `rgb(${r},${g},${b})`;
}
function darken(hex, pct) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, (num >> 16) - Math.round(255 * pct / 100));
  const g = Math.max(0, ((num >> 8) & 0xff) - Math.round(255 * pct / 100));
  const b = Math.max(0, (num & 0xff) - Math.round(255 * pct / 100));
  return `rgb(${r},${g},${b})`;
}

// ── Generate more stars dynamically ──
(function generateStars() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1';
  document.body.insertBefore(canvas, document.body.firstChild);
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < 300; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const r = Math.random() * 1.2;
      const a = Math.random() * 0.7 + 0.1;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    }
  }
  window.addEventListener('resize', resize);
  resize();
})();
</script>
